<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bloons</title>
    <script src="https://cdn.statically.io/gh/ruffle-rs/ruffle@master/web/packages/selfhosted/js/ruffle.js"></script>
</head>
<body>

    <div id="game-container" style="width: 1200px; height: 900px;"></div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            container.appendChild(player);
            player.load("https://cdn.statically.io/gh/funschoollearning/educational-work@main/Assets/bloons.swf");
        });
    </script>

</body>
</html>
