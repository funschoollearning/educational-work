<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Bloons</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
      html, body {
        width: 100%;
        /* FIXED: Uses dynamic viewport height to account for mobile browser address bars */
        height: 100svh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        /* FIXED: Grid layout provides cleaner scaling and centering boundaries */
        display: grid;
        place-items: start center;
      }
      #player {
        /* FIXED: Dynamically scales based on the container aspect ratio (4:3) */
        width: min(100svw, 133.33svh);
        height: min(75svw, 100svh);
        max-width: 133.33svh;
        max-height: 100svh;
      }
      /* FIXED: Ensures Ruffle canvas expands properly inside our flex container */
      #player rfl-player, #player canvas {
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <script src="https://unpkg.com"></script>
    <script>
      window.RufflePlayer = window.RufflePlayer || {};
      window.RufflePlayer.config = {
        letterbox: "on",
        scale: "showAll",
        forceScale: true
      };
      window.addEventListener("load", () => {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        const container = document.getElementById("player");
        if (container) {
          container.appendChild(player);
          player.load({ url: "../assets/bloons.swf" });
        }
      });
    </script>
  </body>
</html>
