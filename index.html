<!DOCTYPE html>
<html lang="en">
<head>
<style>
  :root { --bg: #3b3b3b; --rad: 24px; }
  body {
    margin: 0; font-family: -apple-system, sans-serif; min-height: 100vh;
    background: var(--bg) radial-gradient(#4a4a4a 1px, transparent 0) 0 0/4px 4px;
    display: flex; flex-direction: column; align-items: center;
  }
  .search-container {
    width: 100%; max-width: 400px; padding: 30px 20px 10px; position: sticky; top: 0; z-index: 100;
  }
  #searchBar {
    width: 100%; padding: 10px 15px; font-size: 16px; border-radius: 20px; box-sizing: border-box;
    border: 1px solid #000; background: linear-gradient(#fff, #e0e0e0); outline: none;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
  }
  #grid {
    display: grid; grid-template-columns: repeat(auto-fit, 125px);
    justify-content: center; width: 95%; max-width: 1200px; gap: 30px; padding: 20px;
  }
  .game-square {
    position: relative; width: 125px; height: 125px; background: #111; border-radius: var(--rad);
    display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden;
    box-shadow: inset 0 1px 1px #fff, inset 0 -3px 6px rgba(0,0,0,0.8), 0 12px 20px rgba(0,0,0,0.6);
    transition: transform 0.1s linear;
  }
  .game-square:hover { transform: scale(1.08); }
  .game-square:active { transform: scale(0.94); filter: brightness(0.8); }
  .game-image { width: 100%; height: 100%; object-fit: cover; }
  .game-name {
    position: absolute; bottom: -60px; left: 0; right: 0; padding: 10px 0; font-size: 14px; font-weight: 900;
    text-align: center; color: white; text-shadow: 0 -1px 1px rgba(0,0,0,0.8);
    background: linear-gradient(#7db9e8, #2989d8 50%, #1e5799);
    border-top: 1.5px solid #003366; transition: bottom 0.2s linear;
  }
  .game-square:hover .game-name { bottom: 0; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="search-container">
  <input type="text" id="searchBar" placeholder="Search subjects..." oninput="filterGames()">
</div>

<div id="grid"></div>

<script>
  const games = [
    { name: "Bloons", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloons.png", url: "https://funschoollearning.github.io/educational-work/lessons/bloons.html" },
    { name: "More Bloons", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/morebloons.jpg", url: "https://funschoollearning.github.io/educational-work/lessons/morebloons.html" },
    { name: "Even More Bloons", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/evenmorebloons.png", url: "https://funschoollearning.github.io/educational-work/lessons/evenmorebloons.html" },
    { name: "Bloons Player Pack 1", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonspp1.jpg", url: "https://funschoollearning.github.io/educational-work/lessons/bloonspp1.html" },
    { name: "Bloons Player Pack 2", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonspp2.jpg", url: "https://funschoollearning.github.io/educational-work/lessons/bloonspp2.html" },
    { name: "Bloons Player Pack 3", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonspp3.jpg", url: "https://funschoollearning.github.io/educational-work/lessons/bloonspp3.html" },
    { name: "Bloons Player Pack 4", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonspp4.jpg", url: "https://funschoollearning.github.io/educational-work/lessons/bloonspp4.html" },
    { name: "Bloons Player Pack 5", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonspp5.png", url: "https://funschoollearning.github.io/educational-work/lessons/bloonspp5.html" },
    { name: "Bloons Junior", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonsjunior.png", url: "https://funschoollearning.github.io/educational-work/lessons/bloonsjunior.html" },
    { name: "Bloons Insanity", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonsinsanity.jpg", url: "https://funschoollearning.github.io/educational-work/lessons/bloonsinsanity.html" },
    { name: "Bloons 2", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloons2.png", url: "https://funschoollearning.github.io/educational-work/lessons/bloons2.html" },
    { name: "Bloons TD", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonstd.png", url: "https://funschoollearning.github.io/educational-work/lessons/bloonstd.html" },
    { name: "Bloons TD 2", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonstd2.png", url: "https://funschoollearning.github.io/educational-work/lessons/bloonstd2.html" },
    { name: "Bloons TD 3", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonstd3.png", url: "https://funschoollearning.github.io/educational-work/lessons/bloonstd3.html" },
    { name: "Bloons TD 4", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonstd4.png", url: "https://funschoollearning.github.io/educational-work/lessons/bloonstd4.html" },
    { name: "Bloons TD 4 Expansion", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonstd4exp.png", url: "https://funschoollearning.github.io/educational-work/lessons/bloonstd4exp.html" },
    { name: "Bloons Pop Three", img: "https://raw.githubusercontent.com/funschoollearning/educational-work/refs/heads/main/images/bloonspopthree.jpg", url: "https://funschoollearning.github.io/educational-work/lessons/bloonspopthree.html" },
  ];

  const grid = document.getElementById('grid');

  games.forEach(game => {
    const square = document.createElement('div');
    square.className = 'game-square';
    square.onclick = () => {
      const win = window.open('about:blank', '_blank');
      const iframe = win.document.createElement('iframe');
      iframe.src = game.url;
      iframe.style.cssText = "width:100vw; height:100vh; border:none; position:fixed; top:0; left:0;";
      win.document.body.style.margin = "0";
      win.document.body.appendChild(iframe);
    };
    square.innerHTML = `<img src="${game.img}" class="game-image" alt="${game.name}"><div class="game-name">${game.name}</div>`;
    grid.appendChild(square);
  });

  function filterGames() {
    const term = document.getElementById('searchBar').value.toLowerCase();
    const squares = grid.children;
    for (let i = 0; i < squares.length; i++) {
      const name = games[i].name.toLowerCase();
      squares[i].classList.toggle('hidden', !name.includes(term));
    }
  }
</script>

</body>
</html>
